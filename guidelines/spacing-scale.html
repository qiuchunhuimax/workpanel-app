<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:20px;background:var(--surface-app)}
.row{display:flex;align-items:flex-end;gap:10px;height:80px}
.bar{background:var(--accent-default);border-radius:2px;width:20px}
.lbl{display:flex;flex-direction:column;align-items:center;gap:6px;font:var(--type-mono);font-size:10px;color:var(--text-secondary)}
</style></head><body>
<div class="row">
<div class="lbl"><div class="bar" style="height:var(--space-1)"></div>4</div>
<div class="lbl"><div class="bar" style="height:var(--space-2)"></div>8</div>
<div class="lbl"><div class="bar" style="height:var(--space-3)"></div>12</div>
<div class="lbl"><div class="bar" style="height:var(--space-4)"></div>16</div>
<div class="lbl"><div class="bar" style="height:var(--space-6)"></div>24</div>
<div class="lbl"><div class="bar" style="height:var(--space-8)"></div>32</div>
<div class="lbl"><div class="bar" style="height:var(--space-12)"></div>48</div>
<div class="lbl"><div class="bar" style="height:64px"></div>64</div>
</div>
</body></html>
