<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Terracotta" subtitle="Primary action color, used sparingly" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--surface-app);font-family:var(--font-body)}
.row{display:flex;gap:8px;height:96px}
.sw{flex:1;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font:var(--type-label);color:var(--text-on-accent)}
.sw span{font-family:var(--font-mono);font-size:10px;opacity:.85}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--base-terracotta-700)">700<span>#7A3A30</span></div>
<div class="sw" style="background:var(--base-terracotta-600)">600<span>#93453A</span></div>
<div class="sw" style="background:var(--base-terracotta-500)">500 default<span>#B0574B</span></div>
<div class="sw" style="background:var(--base-terracotta-200);color:var(--text-primary)">200<span>#E9C6BE</span></div>
<div class="sw" style="background:var(--base-terracotta-100);color:var(--text-primary)">100<span>#F4E4E0</span></div>
</div>
</body></html>
