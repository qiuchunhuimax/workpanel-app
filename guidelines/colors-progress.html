<!-- @dsCard group="Colors" viewport="700x150" name="Progress & Milestone — Ochre" subtitle="Reserved for progress bars and milestone markers" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--surface-app);font-family:var(--font-body)}
.row{display:flex;gap:8px;height:96px}
.sw{flex:1;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font:var(--type-label)}
.sw span{font-family:var(--font-mono);font-size:10px;opacity:.75}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--base-ochre-600);color:#fff">600<span>#96701F</span></div>
<div class="sw" style="background:var(--base-ochre-500);color:#fff">500 fill<span>#C08A2E</span></div>
<div class="sw" style="background:var(--base-ochre-200);color:var(--text-primary)">200<span>#EBD6A8</span></div>
<div class="sw" style="background:var(--base-ochre-100);color:var(--text-primary)">100 track<span>#F5EAD3</span></div>
</div>
</body></html>
