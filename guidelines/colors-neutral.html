<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Paper & Ink" subtitle="Warm cream ground, near-black ink" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--surface-app);font-family:var(--font-body)}
.row{display:flex;gap:8px;height:96px}
.sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border-subtle);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font:var(--type-label)}
.sw span{font-family:var(--font-mono);font-size:10px;opacity:.7}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--base-ink-900);color:#fff">ink-900<span>#1A1A1A</span></div>
<div class="sw" style="background:var(--base-ink-500);color:#fff">ink-500<span>#6B6560</span></div>
<div class="sw" style="background:var(--base-ink-300);color:var(--text-primary)">ink-300<span>#A8A398</span></div>
<div class="sw" style="background:var(--base-paper-050);color:var(--text-primary)">paper-050<span>#F4F2ED</span></div>
<div class="sw" style="background:var(--base-paper-000);color:var(--text-primary)">paper-000<span>#FAFAF8</span></div>
<div class="sw" style="background:var(--base-white);color:var(--text-primary)">white<span>#FFFFFF</span></div>
</div>
</body></html>
